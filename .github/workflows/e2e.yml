name: E2E Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run creator E2E tests (RTC)
        run: npm run test:creator
        continue-on-error: true
        env:
          STAGING_LANDING_URL: ${{ secrets.STAGING_LANDING_URL }}
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TESTOPS_API_TOKEN }}
          KAKAO_EMAIL: ${{ secrets.KAKAO_EMAIL }}
          KAKAO_PASSWORD: ${{ secrets.KAKAO_PASSWORD }}
          TEST_PHONE_NUMBER: ${{ secrets.TEST_PHONE_NUMBER }}
          TEST_PHONE_CODE: ${{ secrets.TEST_PHONE_CODE }}

      - name: Run student E2E tests (RTS)
        run: npm run test:student
        continue-on-error: true
        env:
          STAGING_SITE_URL_E1P1K1: ${{ secrets.STAGING_SITE_URL_E1P1K1 }}
          STAGING_SITE_URL_E1P1K0: ${{ secrets.STAGING_SITE_URL_E1P1K0 }}
          STAGING_SITE_URL_E1P0K1: ${{ secrets.STAGING_SITE_URL_E1P0K1 }}
          STAGING_SITE_URL_E1P0K0: ${{ secrets.STAGING_SITE_URL_E1P0K0 }}
          STAGING_SITE_URL_E0P1K1: ${{ secrets.STAGING_SITE_URL_E0P1K1 }}
          STAGING_SITE_URL_E0P1K0: ${{ secrets.STAGING_SITE_URL_E0P1K0 }}
          STAGING_SITE_URL_E0P0K1: ${{ secrets.STAGING_SITE_URL_E0P0K1 }}
          STAGING_SITE_URL_E0P0K0: ${{ secrets.STAGING_SITE_URL_E0P0K0 }}
          QASE_TESTOPS_API_TOKEN: ${{ secrets.QASE_TESTOPS_API_TOKEN }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
