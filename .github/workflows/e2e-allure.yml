name: E2E Tests & Allure Report

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 수동 실행 버튼

permissions:
  contents: write # gh-pages 브랜치에 push하기 위해 필요

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install Allure CLI
        run: npm install -g allure-commandline --save-dev

      # 이전 리포트의 history를 가져와서 트렌드 그래프를 유지
      - name: Get previous Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages-prev

      - name: Copy previous history into allure-report
        if: always()
        continue-on-error: true
        run: |
          mkdir -p allure-report/history
          cp -r gh-pages-prev/history/. allure-report/history/ 2>/dev/null || true

      - name: Run E2E tests
        run: npm test
        continue-on-error: true # 테스트 실패해도 리포트는 생성
        env:
          STAGING_LANDING_URL: ${{ secrets.STAGING_LANDING_URL }}

      - name: Generate Allure report
        if: always()
        run: npm run allure:report

      - name: Deploy Allure report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          publish_branch: gh-pages
          destination_dir: .
